baseURL = 'https://kiyotoko.github.io/'
languageCode = 'en-us'
title = 'Kiyotoko'

pygmentsuseclasses = true

[build]
  list = 'always'
  publishResources = true
  render = 'always'
  [build.buildStats]
    disableTags = false

[markup]
  [markup.highlight]
    lineNos = true
    anchorLineNos = true
    lineNumbersInTable = false
    noClasses = false
    style = 'autumn'

[security]
  [security.exec]
    allow = [ '^pandoc$' ]
