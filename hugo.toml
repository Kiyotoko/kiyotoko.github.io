baseURL = 'https://kiyotoko.github.io/'
languageCode = 'en-us'
title = 'Kiyotoko'

[build]
  list = 'always'
  publishResources = true
  render = 'always'
  [build.buildStats]
    disableTags = false

[markup]
  defaultMarkdownHandler = "pandoc"

[security]
  [security.exec]
    allow = [ '^pandoc$' ]
